deploy:
  name: Blue-Green Deploy to EC2
  runs-on: ubuntu-latest
  needs: build_and_push

  steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/internal-utility-service:latest

          echo "🚀 Pulling latest image..."
          docker pull $IMAGE

          # Detect active backend FROM NGINX CONFIG (correct way)
          ACTIVE=$(grep -o 'internal-app-[a-z]*' /etc/nginx/sites-available/default | head -1 | cut -d'-' -f3)

          if [ "$ACTIVE" = "blue" ]; then
            NEW=green
          else
            NEW=blue
          fi

          echo "Active: $ACTIVE"
          echo "Deploying: $NEW"

          # Remove old NEW container
          docker rm -f internal-app-$NEW || true

          # Run new container (NO PORTS, use Docker network)
          docker run -d \
            --name internal-app-$NEW \
            --network app-network \
            -e VERSION=$NEW \
            --restart=always \
            $IMAGE

          echo "⏳ Waiting for container..."
          sleep 5

          echo "🔍 Health check..."

          if ! docker exec internal-app-$NEW curl -s http://localhost:5000/health | grep -q healthy; then
            echo "❌ Health check failed"
            exit 1
          fi

          echo "✅ Healthy"

          echo "🔁 Switching Nginx..."

          sudo sed -i "s/internal-app-$ACTIVE:5000/internal-app-$NEW:5000/g" /etc/nginx/sites-available/default

          sudo systemctl reload nginx

          echo "🔍 Verifying live traffic..."

          sleep 3

          if ! curl -s https://andikanapp.online/health | grep -q $NEW; then
            echo "❌ Switch failed — rolling back"

            sudo sed -i "s/internal-app-$NEW:5000/internal-app-$ACTIVE:5000/g" /etc/nginx/sites-available/default
            sudo systemctl reload nginx

            exit 1
          fi

          echo "🎉 Deployment successful: $NEW is live"
