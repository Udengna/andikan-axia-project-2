name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/internal-utility-service

jobs:
  test:
    name: Run Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8
        run: flake8 .

      - name: Run pytest
        run: pytest -v

  build_and_push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tags
        run: |
          echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV
          echo "SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ env.VERSION }} .

      - name: Tag image
        run: |
          docker tag $IMAGE_NAME:${{ env.VERSION }} $IMAGE_NAME:latest
          docker tag $IMAGE_NAME:${{ env.VERSION }} $IMAGE_NAME:${{ env.SHA }}

      - name: Push images
        run: |
          docker push $IMAGE_NAME:${{ env.VERSION }}
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ env.SHA }}

  deploy:
    name: Blue-Green Deploy to EC2
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/internal-utility-service:latest

            echo "Pulling latest image..."
            docker pull $IMAGE

            # Determine active environment
            if docker ps --format '{{.Names}}' | grep -q internal-app-blue; then
              NEW=green
              OLD=blue
              NEW_PORT=5002
              OLD_PORT=5001
            else
              NEW=blue
              OLD=green
              NEW_PORT=5001
              OLD_PORT=5002
            fi

            echo "Deploying $NEW environment on port $NEW_PORT..."

            # Remove existing NEW container if exists
            docker rm -f internal-app-$NEW || true

            # Run new container
            docker run -d \
              --name internal-app-$NEW \
              --restart=always \
              -p $NEW_PORT:5000 \
              $IMAGE

            echo "Waiting for health check..."

            # Health check loop
            for i in {1..10}; do
              if curl -f http://localhost:$NEW_PORT/health; then
                echo "Health check passed"
                break
              fi
              echo "Retrying in 3 seconds..."
              sleep 3
            done

            echo "Switching Nginx to new version (port $NEW_PORT)..."

            sudo sed -i "s/127.0.0.1:$OLD_PORT/127.0.0.1:$NEW_PORT/" /etc/nginx/sites-available/default
            sudo systemctl reload nginx

            echo "Deployment successful. Now serving: $NEW"

            # Optional: keep old container for rollback
            # docker stop internal-app-$OLD
