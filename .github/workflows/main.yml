name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/internal-utility-service

jobs:
  test:
    name: Run Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - run: flake8 .
      - run: pytest -v

  build_and_push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tags
        run: |
          echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV
          echo "SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - run: docker build -t $IMAGE_NAME:${{ env.VERSION }} .

      - run: |
          docker tag $IMAGE_NAME:${{ env.VERSION }} $IMAGE_NAME:latest
          docker tag $IMAGE_NAME:${{ env.VERSION }} $IMAGE_NAME:${{ env.SHA }}

      - run: |
          docker push $IMAGE_NAME:${{ env.VERSION }}
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ env.SHA }}

  deploy:
    name: Blue-Green Deploy to EC2
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/internal-utility-service:latest

            echo "🚀 Pulling latest image..."
            docker pull $IMAGE

            ACTIVE=$(grep -o 'internal-app-[a-z]*' /etc/nginx/sites-available/default | head -1 | cut -d'-' -f3)

            if [ "$ACTIVE" = "blue" ]; then
              NEW=green
            else
              NEW=blue
            fi

            echo "Active: $ACTIVE"
            echo "Deploying: $NEW"

            docker rm -f internal-app-$NEW || true

            docker run -d \
              --name internal-app-$NEW \
              --network app-network \
              -e VERSION=$NEW \
              --restart=always \
              $IMAGE

            sleep 5

            if ! docker exec internal-app-$NEW curl -s http://localhost:5000/health | grep -q healthy; then
              echo "❌ Health check failed"
              exit 1
            fi

            echo "🔁 Switching..."

            sudo sed -i "s/internal-app-$ACTIVE:5000/internal-app-$NEW:5000/g" /etc/nginx/sites-available/default
            sudo systemctl reload nginx

            sleep 3

            if ! curl -s https://andikanapp.online/health | grep -q $NEW; then
              echo "❌ Switch failed — rolling back"

              sudo sed -i "s/internal-app-$NEW:5000/internal-app-$ACTIVE:5000/g" /etc/nginx/sites-available/default
              sudo systemctl reload nginx

              exit 1
            fi

            echo "🎉 Deployment successful"
